<!DOCTYPE html>
<html>

<head>
  <base target="_top">

  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">

<style>

:root{

  --charcoal:#0E1114;
  --graphite:#2A2E33;
  --gold:#C9A227;

  --bg:#F9F8F5;
  --surface:#FFFFFF;

  --text:#0E1114;

  --border:rgba(14,17,20,.08);

  --shadow:
      0 1px 3px rgba(0,0,0,.04),
      0 10px 24px rgba(0,0,0,.06);

}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'IBM Plex Sans',sans-serif;

  background:var(--bg);

  padding:30px;
}

.container{

  max-width:900px;
  margin:auto;
}

.card{

  background:var(--surface);

  border:1px solid var(--border);

  border-radius:20px;

  box-shadow:var(--shadow);

  padding:28px 32px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:20px;

  transition:.25s;
}

.card:hover{

  transform:translateY(-2px);
}

.title{

  flex:1;
}

.title h1{

  font-size:1.7rem;

  font-weight:300;

  line-height:1.35;

  color:var(--text);
}

.copy-btn{

  background:var(--charcoal);

  color:#fff;

  border:none;

  border-radius:12px;

  padding:14px 28px;

  cursor:pointer;

  font-size:15px;

  font-weight:500;

  transition:.2s;
}

.copy-btn:hover{

  background:var(--graphite);
}

.toast{

  position:fixed;

  top:25px;
  right:25px;

  background:#2F6F5E;

  color:#fff;

  padding:14px 20px;

  border-radius:12px;

  opacity:0;

  transform:translateY(-15px);

  transition:.3s;

  pointer-events:none;
}

.toast.show{

  opacity:1;

  transform:translateY(0);
}

@media(max-width:768px){

  body{
    padding:15px;
  }

  .card{

    flex-direction:column;

    align-items:flex-start;
  }

  .copy-btn{

    width:100%;
  }

  .title h1{

    font-size:1.3rem;
  }
}

</style>

</head>

<body>

<div class="container">

  <div class="card">

      <div class="title">

          <h1><?= docTitle ?></h1>

      </div>

      <button class="copy-btn"
              onclick="copyDocument()">

          Copy

      </button>

  </div>

</div>


<!-- Hidden content for copying only -->

<div id="hiddenContent"
     style="display:none; white-space:pre-wrap;">

<?!= docContent ?>

</div>


<div id="toast"
     class="toast">

     Copied Successfully

</div>

<script>

function copyDocument(){

  const text =
      document.getElementById('hiddenContent')
      .innerText;

  navigator.clipboard.writeText(text);

  const toast =
      document.getElementById('toast');

  toast.classList.add('show');

  setTimeout(()=>{

      toast.classList.remove('show');

  },2000);
}

</script>

</body>
</html>
